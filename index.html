<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丧尸世界</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <div id="game-header">
      <h1>丧尸世界</h1>
      <p class="subtitle">末日生存文字游戏</p>
    </div>
    <div id="name-setup">
      <label for="name-input">请输入你的名字：</label>
      <input type="text" id="name-input" placeholder="输入角色名..." maxlength="10">
      <div class="start-buttons">
        <button id="new-game-btn">新游戏</button>
        <button id="load-game-btn">读取存档</button>
        <button id="best-record-btn">查看时长</button>
      </div>
    </div>
    <div id="save-page" style="display:none;">
      <div class="panel save-panel">
        <div class="panel-title">存档管理</div>
        <div id="save-story-area" class="panel"></div>
        <div id="save-slots-area"></div>
        <div id="save-options-area"></div>
        <div class="save-actions">
          <button id="save-return-btn">返回</button>
        </div>
      </div>
    </div>
    <div id="best-record-page" style="display:none;">
      <div class="panel best-record-panel">
        <div class="panel-title">历史最佳纪录</div>
        <div id="best-record-content"></div>
        <div class="save-actions">
          <button id="best-record-return-btn">返回</button>
        </div>
      </div>
    </div>
    <div id="game-content" style="display:none;">
      <div id="stats-panel"></div>
      <div id="weapon-panel"></div>
      <div id="inventory-panel"></div>
      <div id="cargo-panel"></div>
      <div id="story-area" class="panel"></div>
      <div id="options-area"></div>
    </div>
    <div id="input-area" style="display:none;">
      <input type="text" id="action-input" placeholder="输入数字选项...">
      <button id="submit-btn">确认</button>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
